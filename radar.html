<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily AI Radar — Jozo Meštrović</title>
<meta name="description" content="A daily AI news digest, generated automatically." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="reader news">

  <header class="news-topbar">
    <a class="news-back" href="/" aria-label="Back to home">← Jozo Meštrović</a>
    <h1 class="news-title">Daily AI Radar</h1>
    <div class="news-controls">
      <label class="news-date" aria-label="Pick a date">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
          <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
            d="M3 7h18M3 7v12a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7M3 7l1-3h16l1 3M8 3v4M16 3v4"/>
        </svg>
        <input type="date" id="dateInput" />
      </label>
      <a
        class="news-source-link"
        href="https://github.com/mestrovicjozo/daily-ai-radar"
        target="_blank"
        rel="noopener noreferrer"
      >Source</a>
    </div>
  </header>

  <nav class="news-tabs" id="newsTabs" aria-label="Categories">
    <button type="button" class="news-tab is-active" data-cat="all">Latest</button>
    <button type="button" class="news-tab" data-cat="General AI">General AI</button>
    <button type="button" class="news-tab" data-cat="LLMs">LLMs</button>
    <button type="button" class="news-tab" data-cat="AI Tools">AI Tools</button>
  </nav>

  <main class="news-main" id="newsMain">
    <p class="news-status" id="newsStatus">Loading latest issue…</p>
  </main>

<script>
(() => {
  const dateInput = document.getElementById('dateInput');
  const tabsEl = document.getElementById('newsTabs');
  const mainEl = document.getElementById('newsMain');
  const statusEl = document.getElementById('newsStatus');

  let allDates = [];
  let currentDate = null;
  let currentArticles = [];
  let currentIntro = '';
  let currentCategory = 'all';
  const digestCache = new Map();
  let renderToken = 0;

  const escapeHtml = (s) =>
    s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  const fmtDate = (d) => {
    try {
      return new Date(d + 'T00:00:00Z').toLocaleDateString(undefined,
        { month: 'long', day: 'numeric', year: 'numeric' });
    } catch { return d; }
  };

  const fmtDateShort = (d) => {
    try {
      return new Date(d + 'T00:00:00Z').toLocaleDateString(undefined,
        { month: 'short', day: 'numeric' });
    } catch { return d; }
  };

  // Parse the daily-ai-radar markdown into structured articles
  const parseDigest = (md) => {
    const result = { title: '', intro: '', articles: [] };
    const lines = md.replace(/\r/g, '').split('\n');
    const blocks = [];
    let buf = [];
    for (const line of lines) {
      if (line.trim() === '') {
        if (buf.length) { blocks.push(buf.join('\n')); buf = []; }
      } else { buf.push(line); }
    }
    if (buf.length) blocks.push(buf.join('\n'));

    let currentSection = null;
    let currentArticle = null;
    let sawSection = false;

    for (const block of blocks) {
      if (block.startsWith('# ')) {
        result.title = block.slice(2).trim();
      } else if (block.startsWith('## ')) {
        currentSection = block.slice(3).trim();
        currentArticle = null;
        sawSection = true;
      } else if (block.startsWith('### ')) {
        const text = block.slice(4).trim();
        const m = text.match(/^([^:]+):\s*\[([^\]]+)\]\(([^)]+)\)/);
        if (m) {
          currentArticle = {
            section: currentSection || 'Top Stories',
            category: m[1].trim(),
            title: m[2].trim(),
            url: m[3].trim(),
            source: '',
            summary: '',
            whyItMatters: ''
          };
          result.articles.push(currentArticle);
        }
      } else if (block.startsWith('**Source:**')) {
        if (currentArticle) currentArticle.source = block.replace(/^\*\*Source:\*\*\s*/, '').trim();
      } else if (block.startsWith('**Why it matters:**')) {
        if (currentArticle) currentArticle.whyItMatters = block.replace(/^\*\*Why it matters:\*\*\s*/, '').trim();
      } else if (block.trim() === '---' || /^_.*_$/.test(block.trim())) {
        // separator or trailing italic — skip
      } else if (currentArticle) {
        currentArticle.summary += (currentArticle.summary ? '\n\n' : '') + block;
      } else if (!sawSection) {
        result.intro += (result.intro ? '\n\n' : '') + block;
      }
    }
    return result;
  };

  const renderCard = (art) => {
    const safeTitle = escapeHtml(art.title);
    const safeUrl = escapeHtml(art.url);
    const safeCat = escapeHtml(art.category);
    const safeSrc = escapeHtml(art.source);
    const safeSummary = escapeHtml(art.summary).replace(/\n+/g, '<br />');
    const safeWhy = escapeHtml(art.whyItMatters);
    const safeDate = art.date ? escapeHtml(fmtDateShort(art.date)) : '';
    return `
      <article class="news-card">
        ${safeDate ? `<span class="news-card__date">${safeDate}</span>` : ''}
        <p class="news-card__cat">${safeCat}</p>
        <h3 class="news-card__title">
          <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeTitle}</a>
        </h3>
        ${safeSrc ? `<p class="news-card__source">${safeSrc}</p>` : ''}
        ${art.summary ? `<p class="news-card__summary">${safeSummary}</p>` : ''}
        ${safeWhy ? `<p class="news-card__why"><strong>Why it matters:</strong> ${safeWhy}</p>` : ''}
      </article>
    `;
  };

  const fetchDigest = async (date) => {
    if (digestCache.has(date)) return digestCache.get(date);
    const res = await fetch(`/api/radar/digest/${encodeURIComponent(date)}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
    const parsed = parseDigest(data.content || '');
    parsed.articles.forEach(a => { a.date = date; });
    digestCache.set(date, parsed);
    return parsed;
  };

  const renderLatest = () => {
    const html = [];
    if (currentIntro) {
      html.push(`<p class="news-intro">${escapeHtml(currentIntro)}</p>`);
    }
    const sections = ['Top Stories', 'Honorable Mentions'];
    let renderedAny = false;
    for (const sec of sections) {
      const items = currentArticles.filter(a => a.section === sec);
      if (!items.length) continue;
      renderedAny = true;
      html.push(`
        <section class="news-section">
          <h2 class="news-section__title">${escapeHtml(sec)}</h2>
          <div class="news-grid news-grid--${sec === 'Top Stories' ? 'top' : 'honorable'}">
            ${items.map(renderCard).join('')}
          </div>
        </section>
      `);
    }
    if (!renderedAny) {
      html.push('<p class="news-status">No articles for this date.</p>');
    }
    mainEl.innerHTML = html.join('');
  };

  const renderCategory = async () => {
    const token = ++renderToken;
    mainEl.innerHTML = '<p class="news-status">Loading…</p>';

    const startIdx = Math.max(0, allDates.indexOf(currentDate));
    const collected = [];
    for (let i = startIdx; i < allDates.length && collected.length < 9; i++) {
      try {
        const p = await fetchDigest(allDates[i]);
        if (token !== renderToken) return;
        for (const art of p.articles) {
          if (art.category === currentCategory) {
            collected.push(art);
            if (collected.length >= 9) break;
          }
        }
      } catch {
        // skip a missing/broken digest and keep walking
      }
    }
    if (token !== renderToken) return;

    if (!collected.length) {
      mainEl.innerHTML = `<p class="news-status">No ${escapeHtml(currentCategory)} articles found.</p>`;
      return;
    }

    mainEl.innerHTML = `
      <section class="news-section">
        <h2 class="news-section__title">${escapeHtml(currentCategory)}</h2>
        <div class="news-grid news-grid--top">
          ${collected.map(renderCard).join('')}
        </div>
      </section>
    `;
  };

  const renderArticles = () => {
    if (currentCategory === 'all') {
      renderLatest();
    } else {
      renderCategory();
    }
  };

  const loadDigest = async (date) => {
    mainEl.innerHTML = '<p class="news-status">Loading…</p>';
    try {
      const parsed = await fetchDigest(date);
      currentDate = date;
      currentArticles = parsed.articles;
      currentIntro = parsed.intro;

      if (dateInput.value !== date) dateInput.value = date;

      const newUrl = `/radar?date=${date}`;
      if (location.pathname + location.search !== newUrl) {
        history.replaceState(null, '', newUrl);
      }

      renderArticles();
      window.scrollTo({ top: 0, behavior: 'instant' });
    } catch (err) {
      mainEl.innerHTML = `<p class="news-status news-status--error">${escapeHtml(err.message || 'Failed to load issue.')}</p>`;
    }
  };

  // Tab clicks → filter category
  tabsEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.news-tab');
    if (!btn) return;
    currentCategory = btn.dataset.cat;
    tabsEl.querySelectorAll('.news-tab').forEach(b => b.classList.toggle('is-active', b === btn));
    renderArticles();
  });

  // Date input → load that day
  dateInput.addEventListener('change', () => {
    const v = dateInput.value;
    if (!v) return;
    if (v === currentDate) return;
    loadDigest(v);
  });

  // Boot: fetch list, set min/max + default to latest
  (async () => {
    try {
      const res = await fetch('/api/radar/list');
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);

      allDates = Array.isArray(data.dates) ? data.dates : [];
      if (!allDates.length) {
        mainEl.innerHTML = '<p class="news-status">No issues yet — check back tomorrow.</p>';
        return;
      }

      // Sorted descending; first is most recent.
      const minDate = allDates[allDates.length - 1];
      const maxDate = allDates[0];
      dateInput.min = minDate;
      dateInput.max = maxDate;

      const params = new URLSearchParams(location.search);
      const requested = params.get('date');
      const initial = requested && allDates.includes(requested) ? requested : maxDate;
      dateInput.value = initial;
      loadDigest(initial);
    } catch (err) {
      mainEl.innerHTML = `<p class="news-status news-status--error">Could not load issues: ${escapeHtml(err.message || 'unknown error')}</p>`;
    }
  })();
})();
</script>
</body>
</html>
